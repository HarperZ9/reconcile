<!doctype html>
<!-- reconcile — the engine, live in the browser. Zero build, zero deps: this page imports the
     engine module directly and runs the whole loop client-side. Serve the repo root over http
     (ES modules need it), e.g.  python -m http.server  then open /web/index.html . -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>reconcile · the unified engine</title>
<style>
  :root{ --bg:#0b0e13; --panel:#12161e; --line:#283143; --ink:#eef2f8; --dim:#9aa6bb; --a:#2dd4bf; --b:#7a5cff;
         --mono:'SFMono-Regular',Consolas,monospace; --font:'Segoe UI',system-ui,sans-serif; }
  *{box-sizing:border-box} body{margin:0;background:radial-gradient(1100px 560px at 72% -8%,#161b26,#0b0e13 62%);color:var(--ink);font-family:var(--font)}
  header{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,14,19,.9);backdrop-filter:blur(8px);z-index:5}
  h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.4px} h1 small{color:var(--dim);font-weight:400}
  .grow{flex:1} label{display:flex;flex-direction:column;gap:3px;font:11px/1.3 var(--font);color:var(--dim)}
  input,select,button{font:inherit;color:var(--ink);background:#0e131b;border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  input[type=number]{width:70px} button{cursor:pointer} button:hover{border-color:var(--a)}
  button.primary{background:linear-gradient(180deg,var(--a),#1aa896);color:#042b25;border:none;font-weight:600}
  button[aria-pressed=true]{border-color:var(--a);color:var(--a)}
  :focus-visible{outline:3px solid var(--a);outline-offset:2px}
  main{display:grid;grid-template-columns:1fr 360px;gap:18px;padding:18px}@media(max-width:900px){main{grid-template-columns:1fr}}
  .stage{position:relative;aspect-ratio:1/1;background:#06080c;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%}
  section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:15px}
  h2{font:12px/1 var(--mono);text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:0 0 10px}
  .sw{display:flex;gap:5px;margin:8px 0}.sw i{flex:1;height:16px;border-radius:4px}
  .ax{display:flex;align-items:center;gap:8px;font:12px/1 var(--mono);margin:4px 0}.ax span:first-child{width:96px;color:var(--dim)}
  .ax .bar{flex:1;height:7px;background:#0c1118;border-radius:4px;overflow:hidden}.ax .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--b),var(--a))}
  .ax.w .bar i{background:linear-gradient(90deg,#ff6b86,#fbbf24)}.ax.w span:first-child{color:#fbbf24}
  .ax b{width:44px;text-align:right} .receipt{font:11px/1.7 var(--mono);color:var(--dim);word-break:break-all}
  .tag{padding:1px 7px;border-radius:5px;font-size:11px}.tag.verified{background:#0c3b2e;color:#5cebbd}.tag.unverifiable{background:#403a12;color:#f2d35a}.tag.refuted{background:#43161f;color:#ff8aa0}
  #log{font:11px/1.6 var(--mono);color:var(--dim);white-space:pre-wrap;max-height:120px;overflow:auto}.e{color:#ff8aa0}
</style>
</head>
<body>
<header>
  <h1>reconcile <small>· the unified engine</small></h1><span class="grow"></span>
  <label>organ<select id="organ"></select></label>
  <label>seed<input id="seed" type="number" value="7"></label>
  <label>scheme<select id="scheme"><option>analogous</option><option>triadic</option><option>complementary</option><option>wide</option></select></label>
  <button class="primary" id="create">create</button>
  <button id="composeBtn">compose</button>
  <button id="refine" aria-pressed="true">refine: on</button>
</header>
<main>
  <div class="stage" id="stage" role="img" aria-label="The created world"></div>
  <div>
    <section><h2 id="title">world</h2><div class="sw" id="sw"></div><div id="reason" class="receipt"></div></section>
    <section><h2>reasoning · margins (accepted)</h2><div id="axes"></div></section>
    <section><h2>witnessed motion + composition</h2><div id="tl" class="receipt"></div><div id="comp" class="receipt"></div></section>
    <section><h2>receipt · proof before trust</h2><div id="rc" class="receipt"></div></section>
    <section><h2>log</h2><div id="log" role="log" aria-live="polite"></div></section>
  </div>
</main>
<script type="module" src="app.js"></script>
</body>
</html>
